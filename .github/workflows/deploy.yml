name: CI Web

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  ci:
    name: Verificações pré-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: '[SOLID] Verificar violações SOLID/SRP'
        run: |
          MAX_LINES=100
          FOUND=0

          for file in $(find src -name "*.ts" -o -name "*.tsx" | grep -v generated | grep -v "components/ui/"); do
            content=$(cat "$file" 2>/dev/null)

            # 1. Tamanho
            case "$file" in *generated*|*orval*|*components/ui/*|*.config.ts|*.config.js) continue ;; esac
            lines=$(printf '%s\n' "$content" | wc -l)
            if [ "$lines" -gt "$MAX_LINES" ]; then
              echo "BLOCKED [TAMANHO] $file ($lines > $MAX_LINES linhas)"
              FOUND=1
            fi

            # 2. SRP — múltiplas funções exportadas
            case "$file" in
              *generated*|*orval*|*/components/ui/*|*/index.ts|*.types.ts|*.props.ts|*-keys.ts|*/constants/*|*.schema.ts|*.config.ts|*.config.js) ;;
              *)
                n=$(printf '%s\n' "$content" | grep -E "^export (default )?(async )?function [A-Za-z]|^export const [A-Za-z][A-Za-z0-9]* = (async )?(\(|function )" | wc -l)
                if [ "$n" -gt 1 ]; then
                  echo "BLOCKED [SRP-FN] $file — $n funções exportadas (máx 1)"
                  FOUND=1
                fi ;;
            esac

            # 3. Constantes uppercase fora de constants/
            case "$file" in *constants*|*Constants*) ;;
              *)
                n=$(printf '%s\n' "$content" | grep -E "^export const [A-Z][A-Z0-9_]{2,}" | wc -l)
                if [ "$n" -gt 0 ]; then
                  echo "BLOCKED [CONSTANTS] $file — $n constante(s) uppercase fora de constants/"
                  FOUND=1
                fi ;;
            esac

            # 4. Props inline em TSX
            case "$file" in
              *.tsx)
                case "$file" in *.types.*|*.props.*|*types.ts|*props.ts|*/ui/*) ;;
                  *)
                    n=$(printf '%s\n' "$content" | grep -E "^(export )?(interface|type) [A-Za-z]+Props" | wc -l)
                    if [ "$n" -gt 0 ]; then
                      echo "BLOCKED [PROPS] $file — Props inline"
                      FOUND=1
                    fi ;;
                esac ;;
            esac

            # 5. Funções utilitárias em componente TSX
            case "$file" in
              *.tsx)
                case "$file" in */hooks/*|*utils*|*helpers*|*functions*) ;;
                  *)
                    n=$(printf '%s\n' "$content" | grep -E "^export (function [a-z]|const [a-z][a-zA-Z]+ = (async )?\()" | wc -l)
                    if [ "$n" -gt 0 ]; then
                      echo "BLOCKED [FUNCTIONS] $file — $n função(ões) utilitária(s)"
                      FOUND=1
                    fi ;;
                esac ;;
            esac

            # 6. Tipos em .api.ts
            case "$file" in
              *.api.ts)
                case "$file" in *generated*) ;;
                  *)
                    n=$(printf '%s\n' "$content" | grep -E "^export (interface [A-Za-z]|type [A-Za-z][A-Za-z0-9]*[ =<])" | wc -l)
                    if [ "$n" -gt 0 ]; then
                      echo "BLOCKED [API-TYPES] $file — $n tipo(s) em .api.ts"
                      FOUND=1
                    fi ;;
                esac ;;
            esac
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "SOLID violations found. Fix before merging."
            exit 1
          fi
          echo "✓ SOLID ok"

      - name: '[0/4] Gerar integração API (orval)'
        run: npm run api:generate

      - name: '[1/4] Checagem de tipos (TypeScript)'
        run: npx tsc --noEmit

      - name: '[2/4] Lint + format (Biome)'
        run: npx biome check src/

      - name: '[3/4] Testes com cobertura'
        run: npm run test:coverage

      - name: '[4/4] Build de produção'
        run: npm run build
